<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Downloader All</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="container">
    <h1>Downloader Video And Music</h1>
    <input type="text" id="tiktok-url" placeholder="Masukkan URL Video TikTok" />
    <button onclick="fetchVideo()">Download</button>

    <div class="result" id="result">
      <h3>Pratinjau Video</h3>
      <video id="video-preview" controls>
        <source id="video-source" src="" type="video/mp4">
        Browser Anda tidak mendukung tag video.
      </video>
      <button id="download-video-btn" onclick="autoDownload('video')" disabled>Download Video</button>
      <button id="download-music-btn" onclick="autoDownload('music')" disabled>Download Musik</button>
    </div>
  </div>

  <div class="footer">
    <p>Made with ❤️ by RizkyMaxz</p>
  </div>

  <script src="script.js"></script>

</body>
</html>
